# HyprFlux ISO — GRUB Loopback Configuration
# For booting from GRUB loopback (Ventoy, grub2-filemanager, etc.)
#
# Usage: set iso_path="/path/to/hyprflux.iso" and source this config

# Search for the ISO volume
search --no-floppy --set=archiso_img_dev --file "${iso_path}"
probe --set archiso_img_dev_uuid --fs-uuid "${archiso_img_dev}"

# Get a human readable platform identifier
if [ "${grub_platform}" == 'efi' ]; then
    archiso_platform='UEFI'
elif [ "${grub_platform}" == 'pc' ]; then
    archiso_platform='BIOS'
else
    archiso_platform="${grub_cpu}-${grub_platform}"
fi

# Set default menu entry
default=hyprflux
timeout=10
timeout_style=menu

# =============================================================================
# Menu Entries
# =============================================================================

menuentry "Boot HyprFlux (%ARCH%, ${archiso_platform})" --class hyprflux --class arch --class gnu-linux --class gnu --class os --id 'hyprflux' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% img_dev=UUID=${archiso_img_dev_uuid} img_loop="${iso_path}" cow_spacesize=4G quiet splash loglevel=3
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

menuentry "Boot HyprFlux (NVIDIA) (%ARCH%, ${archiso_platform})" --class hyprflux --class arch --class gnu-linux --class gnu --class os --id 'hyprflux-nvidia' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% img_dev=UUID=${archiso_img_dev_uuid} img_loop="${iso_path}" cow_spacesize=4G quiet splash loglevel=3 nvidia-drm.modeset=1
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

menuentry "Boot HyprFlux (Safe Graphics) (%ARCH%, ${archiso_platform})" --class hyprflux --class arch --class gnu-linux --class gnu --class os --id 'hyprflux-safe' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% img_dev=UUID=${archiso_img_dev_uuid} img_loop="${iso_path}" cow_spacesize=4G nomodeset
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

if [ "${grub_platform}" == 'efi' ]; then
    menuentry 'UEFI Firmware Settings' --id 'uefi-firmware' {
        fwsetup
    }
fi

menuentry 'System shutdown' --class shutdown --class poweroff {
    echo 'System shutting down...'
    halt
}

menuentry 'System restart' --class reboot --class restart {
    echo 'System rebooting...'
    reboot
}
