# grub.cfg -- HyprFlux Live ISO (GRUB/UEFI fallback)
#
# NOTE: No "search" command is used. The archiso initcpio hook discovers
# the boot media via the archisosearchuuid kernel parameter.

# Load partition table and file system modules
insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod ntfs
insmod ntfscomp
insmod exfat
insmod udf

# Load graphics modules and HyprFlux theme when available
insmod all_video
insmod gfxterm
insmod gfxmenu
insmod png

# Use graphics-mode output and load the HyprFlux theme.
# GRUB themes are more reliable when loaded via an absolute ISO path and
# exported before switching to gfxterm.
if loadfont "${prefix}/fonts/unicode.pf2" ; then
    set gfxmode="1920x1080,1280x720,1024x768,auto"
    set gfxpayload=keep
    terminal_input console

    if [ -f "/boot/grub/themes/HyprFlux/theme.txt" ]; then
        set theme="/boot/grub/themes/HyprFlux/theme.txt"
        export theme
    fi

    terminal_output gfxterm
fi

# Enable serial console
insmod serial
insmod usbserial_common
insmod usbserial_ftdi
insmod usbserial_pl2303
insmod usbserial_usbdebug
if serial --unit=0 --speed=115200; then
    terminal_input --append serial
    terminal_output --append serial
fi

# Get a human readable platform identifier
if [ "${grub_platform}" == 'efi' ]; then
    archiso_platform='UEFI'
elif [ "${grub_platform}" == 'pc' ]; then
    archiso_platform='BIOS'
else
    archiso_platform="${grub_cpu}-${grub_platform}"
fi

# Set default menu entry
default=hyprflux
timeout=15
timeout_style=menu
set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

# ---- Menu entries ----

menuentry "HyprFlux Installer (%ARCH%, ${archiso_platform})" --class arch --class gnu-linux --class gnu --class os --id 'hyprflux' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=2G
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

menuentry "HyprFlux Installer (%ARCH%, ${archiso_platform}) - Copy to RAM" --class arch --class gnu-linux --class gnu --class os --id 'hyprflux-ram' {
    set gfxpayload=keep
    linux /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=2G copytoram=y
    initrd /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
}

if [ "${grub_platform}" == 'efi' -a "${grub_cpu}" == 'x86_64' -a -f '/shellx64.efi' ]; then
    menuentry 'UEFI Shell' --class efi {
        chainloader /shellx64.efi
    }
fi

if [ "${grub_platform}" == 'efi' ]; then
    menuentry 'UEFI Firmware Settings' --id 'uefi-firmware' {
        fwsetup
    }
fi

menuentry 'System shutdown' --class shutdown --class poweroff {
    echo 'System shutting down...'
    halt
}

menuentry 'System restart' --class reboot --class restart {
    echo 'System rebooting...'
    reboot
}
