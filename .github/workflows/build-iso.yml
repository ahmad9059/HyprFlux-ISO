name: Build HyprFlux ISO

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: iso-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-iso:
    name: Build ISO
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed archiso git

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build ISO
        run: |
          echo "Building HyprFlux ISO..."
          mkarchiso -v -w work -o out .
          echo "Build complete."

      - name: Get ISO info
        id: iso
        run: |
          ISO_FILE=$(ls out/*.iso | head -1)
          ISO_NAME=$(basename "$ISO_FILE")
          ISO_SIZE=$(du -h "$ISO_FILE" | cut -f1)
          echo "ISO: ${ISO_NAME} (${ISO_SIZE})"
          echo "file=${ISO_FILE}" >> "$GITHUB_OUTPUT"
          echo "name=${ISO_NAME}" >> "$GITHUB_OUTPUT"
          echo "size=${ISO_SIZE}" >> "$GITHUB_OUTPUT"
          sha256sum "$ISO_FILE" > "${ISO_FILE}.sha256"
          echo "SHA256: $(cat "${ISO_FILE}.sha256")"

      - name: Upload ISO artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.iso.outputs.name }}
          path: |
            ${{ steps.iso.outputs.file }}
            ${{ steps.iso.outputs.file }}.sha256
          retention-days: 14
          compression-level: 0

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build-iso]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download ISO artifact
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "HyprFlux ${{ github.ref_name }}"
          body: |
            ## HyprFlux ${{ github.ref_name }}

            Pre-configured Hyprland desktop on Arch Linux.

            ### Installation

            1. Download the ISO file below
            2. Write to USB:
               ```bash
               sudo dd bs=4M if=hyprflux-*.iso of=/dev/sdX status=progress oflag=sync
               ```
            3. Boot from USB and follow the TUI installer

            ### Features

            - Omarchy-style TUI installer with HyprFlux branding
            - Pre-configured Hyprland + Waybar + Rofi + SwayNC
            - NVIDIA GPU auto-detection and driver installation
            - Both UEFI and Legacy BIOS boot support
            - Automatic or manual disk partitioning
            - PipeWire audio stack
            - Zsh with Oh My Zsh
            - 20+ pre-configured applications

            ### Verify Download

            ```bash
            sha256sum -c hyprflux-*.iso.sha256
            ```

            ### Requirements

            - 64-bit x86 processor
            - 4GB+ RAM (8GB recommended)
            - 20GB+ disk space
            - Internet connection during installation
          files: |
            artifacts/**/*.iso
            artifacts/**/*.sha256
          draft: false
          prerelease: ${{ contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
