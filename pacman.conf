#
# pacman.conf -- Build-time pacman configuration for HyprFlux ISO
#
# This config is used by mkarchiso when installing packages into the
# live environment. It mirrors the releng profile with multilib enabled.
#

[options]
HoldPkg     = pacman glibc
Architecture = auto
SigLevel    = Required DatabaseOptional
LocalFileSigLevel = Optional
ParallelDownloads = 5
Color

[core]
Include = /etc/pacman.d/mirrorlist

[extra]
Include = /etc/pacman.d/mirrorlist

[multilib]
Include = /etc/pacman.d/mirrorlist
