LABEL hyprflux
TEXT HELP
Boot the HyprFlux installer on BIOS.
Install HyprFlux (Arch Linux + Hyprland) or perform system maintenance.
ENDTEXT
MENU LABEL HyprFlux Installer (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=2G quiet splash loglevel=3 systemd.show_status=auto rd.udev.log_level=3 vt.global_cursor_default=0

LABEL hyprflux-ram
TEXT HELP
Boot the HyprFlux installer (copy to RAM) on BIOS.
Loads the entire image into RAM for faster operation. Requires 2GB+ RAM.
ENDTEXT
MENU LABEL HyprFlux Installer (%ARCH%, BIOS) - Copy to RAM
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=2G copytoram=y quiet splash loglevel=3 systemd.show_status=auto rd.udev.log_level=3 vt.global_cursor_default=0
