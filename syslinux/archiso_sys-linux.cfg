LABEL hyprflux
TEXT HELP
Boot HyprFlux — A pre-configured Hyprland desktop environment.
Auto-detects your GPU and launches directly into Hyprland.
ENDTEXT
MENU LABEL Boot HyprFlux (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=4G quiet splash loglevel=3

LABEL hyprflux-nvidia
TEXT HELP
Boot HyprFlux with NVIDIA proprietary driver support.
Use this if you have an NVIDIA GPU.
ENDTEXT
MENU LABEL Boot HyprFlux (NVIDIA) (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=4G quiet splash loglevel=3 nvidia-drm.modeset=1

LABEL hyprflux-safe
TEXT HELP
Boot HyprFlux in safe graphics mode (nomodeset).
Use this if you experience display issues.
ENDTEXT
MENU LABEL Boot HyprFlux (Safe Graphics) (%ARCH%, BIOS)
LINUX /%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD /%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% cow_spacesize=4G nomodeset
