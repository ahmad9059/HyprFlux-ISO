LABEL arch_nbd
TEXT HELP
Boot HyprFlux using NBD (Network Block Device).
ENDTEXT
MENU LABEL Boot HyprFlux (%ARCH%, NBD)
LINUX ::/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD ::/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% archiso_nbd_srv=${pxeserver} cow_spacesize=4G quiet splash loglevel=3
SYSAPPEND 3

