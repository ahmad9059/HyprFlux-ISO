LABEL hyprflux_nbd
TEXT HELP
Boot the HyprFlux installer using NBD.
ENDTEXT
MENU LABEL HyprFlux Installer (%ARCH%, NBD)
LINUX ::/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD ::/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archisosearchuuid=%ARCHISO_UUID% archiso_nbd_srv=${pxeserver} cow_spacesize=2G
SYSAPPEND 3

LABEL hyprflux_nfs
TEXT HELP
Boot the HyprFlux installer using NFS.
ENDTEXT
MENU LABEL HyprFlux Installer (%ARCH%, NFS)
LINUX ::/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD ::/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archiso_nfs_srv=${pxeserver}:/run/archiso/bootmnt cow_spacesize=2G
SYSAPPEND 3

LABEL hyprflux_http
TEXT HELP
Boot the HyprFlux installer using HTTP.
ENDTEXT
MENU LABEL HyprFlux Installer (%ARCH%, HTTP)
LINUX ::/%INSTALL_DIR%/boot/%ARCH%/vmlinuz-linux
INITRD ::/%INSTALL_DIR%/boot/%ARCH%/initramfs-linux.img
APPEND archisobasedir=%INSTALL_DIR% archiso_http_srv=http://${pxeserver}/ cow_spacesize=2G
